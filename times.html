<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times Tables Practice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #74b9ff, #dfe6e9);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #2d3436;
        }

        .problem {
            font-size: 32px;
            margin: 25px 0;
            font-weight: bold;
            color: #0984e3;
        }

        input[type="number"] {
            padding: 12px;
            font-size: 20px;
            width: 120px;
            text-align: center;
            border: 2px solid #b2bec3;
            border-radius: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: #0984e3;
            color: white;
        }

        button:hover {
            background-color: #076bb3;
        }

        .message {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }

        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }

        .info {
            margin-top: 15px;
            font-size: 18px;
            color: #2d3436;
        }

        .score {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #2d3436;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Times Tables Practice</h1>

        <div class="problem" id="problem">2 × 3 = ?</div>

        <input type="number" id="answer" placeholder="Answer">
        <br>
        <button onclick="checkAnswer()">Submit</button>

        <div class="message" id="message"></div>
        <div class="info" id="attempts">Attempts left: 3</div>
        <div class="score" id="score">Score: 0</div>
    </div>

    <script>
        let num1, num2;
        let correctAnswer;
        let attemptsLeft = 3;
        let score = 0;

        function newProblem() {
            num1 = Math.floor(Math.random() * 12) + 1;
            num2 = Math.floor(Math.random() * 12) + 1;
            correctAnswer = num1 * num2;

            document.getElementById("problem").textContent = `${num1} × ${num2} = ?`;
            document.getElementById("answer").value = "";
            document.getElementById("message").className = "message";
            document.getElementById("message").style.display = "none";
            attemptsLeft = 3;
            document.getElementById("attempts").textContent = `Attempts left: ${attemptsLeft}`;
            document.getElementById("answer").focus();
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById("answer").value);
            const messageBox = document.getElementById("message");

            if (isNaN(userAnswer)) {
                messageBox.textContent = "Please enter a number.";
                messageBox.className = "message incorrect";
                return;
            }

            if (userAnswer === correctAnswer) {
                score++;
                document.getElementById("score").textContent = `Score: ${score}`;
                messageBox.textContent = "✅ Correct!";
                messageBox.className = "message correct";

                setTimeout(() => {
                    newProblem();
                }, 1200);
            } else {
                attemptsLeft--;
                document.getElementById("attempts").textContent = `Attempts left: ${attemptsLeft}`;

                if (attemptsLeft > 0) {
                    messageBox.textContent = `❌ Incorrect. Try again.`;
                    messageBox.className = "message incorrect";
                } else {
                    messageBox.textContent = `❌ Incorrect. The correct answer was ${correctAnswer}.`;
                    messageBox.className = "message incorrect";

                    setTimeout(() => {
                        newProblem();
                    }, 1800);
                }
            }
        }

        document.getElementById("answer").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        newProblem();
    </script>
</body>
</html>
