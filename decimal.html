<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decimal Math Practice</title>

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --good: #166534;
      --bad: #b91c1c;
      --border: #dbe3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
    }

    /* 🔙 Back Button (Glass Style) */
    .back-home {
      position: fixed;
      top: 20px;
      left: 20px;

      padding: 10px 18px;
      border-radius: 20px;

      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;

      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);

      transition: all 0.2s ease;
      z-index: 1000;
    }

    .back-home:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.05);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    h1, h2, h3 { margin-top: 0; }

    .muted { color: var(--muted); }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .problem-box {
      font-size: 2rem;
      font-weight: bold;
      padding: 20px;
      border: 2px dashed var(--border);
      border-radius: 16px;
      text-align: center;
      margin: 20px 0;
      background: #fbfdff;
    }

    input[type="number"] {
      width: 220px;
      max-width: 100%;
      padding: 12px 14px;
      font-size: 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 1rem;
      cursor: pointer;
      background: var(--accent);
      color: white;
      font-weight: 600;
    }

    button:hover { background: var(--accent-dark); }
    button.secondary { background: #64748b; }

    .feedback {
      min-height: 28px;
      font-weight: bold;
      margin-top: 12px;
      display: block;
    }

    .result-box {
      margin-top: 16px;
      padding: 16px;
      border-radius: 14px;
      font-weight: 700;
      text-align: center;
      font-size: 1.1rem;
    }

    .result-correct {
      background: #dcfce7;
      border: 1px solid #86efac;
      color: #166534;
    }

    .result-wrong {
      background: #fee2e2;
      border: 1px solid #fecaca;
      color: #991b1b;
    }

    .correct { color: var(--good); }
    .wrong { color: var(--bad); }

    .hidden { display: none; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: #f8fbff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 0.95rem;
    }

    th, td {
      border: 1px solid var(--border);
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th { background: #eef4ff; }

    @media (max-width: 640px) {
      .problem-box { font-size: 1.5rem; }
      body { padding: 12px; }
      .card { padding: 16px; }
    }
  </style>
</head>

<body>

  <!-- 🔙 Back Button -->
  <a href="index.html" class="back-home">⬅ Back to Home</a>

  <div class="container">
    <div id="startScreen" class="card">
      <h1>Decimal Math Practice</h1>
      <p class="muted">
        Practice multiplying and dividing decimals. You will get 10 problems,
        up to 3 tries per problem, and a review page at the end. Be sure to round your answers to the nearest hundredth (two decimal places).
      </p>

      <div class="row" style="margin: 16px 0 18px 0;">
        <label for="difficultySelect"><strong>Difficulty:</strong></label>
        <select id="difficultySelect">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>

      <button id="startBtn">Start Practice</button>
    </div>

    <!-- (Rest of your code stays EXACTLY the same) -->
  </div>

</body>
</html>
