<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Division Practice</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #74b9ff, #dfe6e9);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #2d3436;
        }

        .problem {
            font-size: 32px;
            margin: 25px 0;
            font-weight: bold;
            color: #0984e3;
        }

        input[type="number"] {
            padding: 12px;
            font-size: 20px;
            width: 120px;
            text-align: center;
            border: 2px solid #b2bec3;
            border-radius: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: #0984e3;
            color: white;
        }

        button:hover {
            background-color: #076bb3;
        }

        .info {
            margin-top: 15px;
            font-size: 18px;
            color: #2d3436;
        }

        .score {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
            color: #2d3436;
        }

        .back-btn {
            display: block;
            margin: 25px auto 0;
            padding: 12px 20px;
            font-size: 16px;
            background-color: #6c5ce7;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            width: 220px;
            transition: 0.2s;
        }

        .back-btn:hover {
            background-color: #4834d4;
        }

        /* Flash overlay */
        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            font-weight: bold;
            color: white;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .flash.show {
            display: flex;
            opacity: 0.9;
        }

        .flash.correct {
            background-color: #28a745;
        }

        .flash.wrong {
            background-color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Division Practice</h1>

        <div class="problem" id="problem">12 ÷ 3 = ?</div>

        <input type="number" id="answer" placeholder="Answer">
        <br>
        <button onclick="checkAnswer()">Submit</button>

        <div class="info" id="attempts">Attempts left: 3</div>
        <div class="score" id="score">Score: 0</div>

        <a href="math.html" class="back-btn">⬅ Back to Math Page</a>
    </div>

    <div id="flashBox" class="flash"></div>

    <script>
        let num1, num2;
        let correctAnswer;
        let attemptsLeft = 3;
        let score = 0;

        function newProblem() {
            num2 = Math.floor(Math.random() * 12) + 1; // divisor
            correctAnswer = Math.floor(Math.random() * 12) + 1; // answer
            num1 = num2 * correctAnswer; // ensures clean division

            document.getElementById("problem").textContent = `${num1} ÷ ${num2} = ?`;
            document.getElementById("answer").value = "";
            document.getElementById("attempts").textContent = `Attempts left: ${attemptsLeft}`;
            document.getElementById("answer").focus();
        }

        function showFlash(text, type, callback) {
            const flash = document.getElementById("flashBox");
            flash.textContent = text;
            flash.className = `flash show ${type}`;

            setTimeout(() => {
                flash.className = "flash";
                if (callback) callback();
            }, 1000);
        }

        function checkAnswer() {
            const userAnswer = parseInt(document.getElementById("answer").value);

            if (isNaN(userAnswer)) {
                showFlash("ENTER NUMBER", "wrong");
                return;
            }

            if (userAnswer === correctAnswer) {
                score++;
                document.getElementById("score").textContent = `Score: ${score}`;

                showFlash("CORRECT!", "correct", () => {
                    attemptsLeft = 3;
                    newProblem();
                });
            } else {
                attemptsLeft--;
                document.getElementById("attempts").textContent = `Attempts left: ${attemptsLeft}`;

                if (attemptsLeft > 0) {
                    showFlash("WRONG", "wrong");
                } else {
                    showFlash(`ANSWER: ${correctAnswer}`, "wrong", () => {
                        attemptsLeft = 3;
                        newProblem();
                    });
                }
            }
        }

        document.getElementById("answer").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        newProblem();
    </script>
</body>
</html>
