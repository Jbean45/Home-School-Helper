<!DOCTYPE html>
<html>
<head>
    <title>Math Practice</title>
    <style>
        body {
            font-family: Arial, sans-serif;

            /* Background */
            background-image: url('https://images.unsplash.com/photo-1509228468518-180dd4864904');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            color: #fff;
            margin: 0;
            min-height: 100vh;

            /* ✅ CENTER EVERYTHING */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Wrapper to keep everything stacked nicely */
        .wrapper {
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
        }

        .container {
            background-color: rgba(0, 0, 0, 0.65);
            padding: 25px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }

        .btn {
            display: block;
            width: 260px;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            background-color: #2E8B57;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.2s;
        }

        .btn:hover {
            background-color: #246b45;
            transform: scale(1.05);
        }

        .back {
            margin-top: 20px;
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 16px;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <h1>📊 Math Practice</h1>

        <div class="container">
            <a class="btn" href="decimal.html">🔢 Decimator</a>
            <a class="btn" href="tax.html">💲 Sales Tax</a>
            <a class="btn" href="times.html">✖️ Times Tables</a>
            <a class="btn" href="division.html">➗ Division Tables</a>
        </div>

        <br>
        <a class="back" href="index.html">⬅ Back to Home</a>
    </div>

</body>
</html>
